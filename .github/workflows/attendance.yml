name: greytHR sign-in

on:
  schedule:
    # 04:30 UTC = 10:00 IST. GitHub cron can drift up to ~15 min.
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

concurrency:
  group: greythr-sign-in
  cancel-in-progress: false

jobs:
  sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run sign-in
        id: signin
        env:
          GREYTHR_EMP_ID: ${{ secrets.GREYTHR_EMP_ID }}
          GREYTHR_PASSWORD: ${{ secrets.GREYTHR_PASSWORD }}
        run: node attendance.js

      - name: Notify via ntfy
        if: always()
        continue-on-error: true
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          STATUS: ${{ job.status }}
          RESULT: ${{ steps.signin.outputs.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "No NTFY_TOPIC secret set — skipping notification."
            exit 0
          fi

          case "$STATUS" in
            success)
              case "$RESULT" in
                signed-in)         TITLE="greytHR"; BODY="Signed in for today"; TAGS="white_check_mark"; PRIORITY="default" ;;
                already-signed-in) TITLE="greytHR"; BODY="Already signed in";    TAGS="white_check_mark"; PRIORITY="default" ;;
                weekend)           TITLE="greytHR"; BODY="Weekend — no swipe needed"; TAGS="sleeping"; PRIORITY="low" ;;
                holiday)           TITLE="greytHR"; BODY="Holiday today — no swipe needed"; TAGS="palm_tree"; PRIORITY="low" ;;
                *)                 TITLE="greytHR"; BODY="Run finished ($RESULT)"; TAGS="white_check_mark"; PRIORITY="default" ;;
              esac
              ;;
            *)
              TITLE="greytHR FAILED"
              BODY="Sign-in failed. See $RUN_URL"
              TAGS="x,warning"
              PRIORITY="high"
              ;;
          esac

          curl -sS \
            -H "Title: $TITLE" \
            -H "Tags: $TAGS" \
            -H "Priority: $PRIORITY" \
            -d "$BODY" \
            "https://ntfy.sh/$NTFY_TOPIC"
