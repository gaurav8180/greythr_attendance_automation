name: greytHR sign-in

on:
  schedule:
    # 01:30 UTC = 07:00 IST. GitHub cron can drift up to ~15 min.
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

concurrency:
  group: greythr-sign-in
  cancel-in-progress: false

jobs:
  sign-in:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run sign-in
        env:
          GREYTHR_EMP_ID: ${{ secrets.GREYTHR_EMP_ID }}
          GREYTHR_PASSWORD: ${{ secrets.GREYTHR_PASSWORD }}
        run: node attendance.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            result.png
            error.png
          if-no-files-found: ignore
          retention-days: 14
